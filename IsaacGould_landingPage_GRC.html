<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isaac Gould | Conference Links</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Standard & Academic Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --teal-deep: #0f4c5c;
            --teal-bright: #2ec4b6;
            --gold-accent: #ff9f1c; /* Gold highlight */
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #0f172a;
            
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }
        
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            color: var(--text-dark);
            
            /* Visual Background: Abstract Crystal / Cooling Visual Gradient */
            background-image: linear-gradient(rgba(15, 76, 92, 0.9), rgba(46, 196, 182, 0.7)), 
                              url('https://images.unsplash.com/photo-1599940824399-b87987ceb72a?q=80&w=1000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Headshot Image */
        .headshot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffffff;
            margin: 0 auto 16px auto;
            box-shadow: var(--shadow-lg);
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0 0 6px 0;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.25);
            animation: fadeInDown 0.9s ease-out;
        }

        .affil {
            display: inline-block;
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.92rem;
            margin-bottom: 28px;
            backdrop-filter: blur(6px);
            font-weight: 600;
            line-height: 1.4;
            animation: fadeInDown 1s ease-out;
        }

        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Standard Card Style */
        .link-card {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background-color: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--teal-deep);
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(8px);
            opacity: 0;
            animation: fadeInUp 0.5s ease-out forwards;
        }

        /* Staggered Entry Animations */
        .link-card:nth-child(1) { animation-delay: 0.15s; }
        .link-card:nth-child(2) { animation-delay: 0.25s; }
        .link-card:nth-child(3) { animation-delay: 0.35s; }
        .link-card:nth-child(4) { animation-delay: 0.45s; }
        .link-card:nth-child(5) { animation-delay: 0.55s; }
        .link-card:nth-child(6) { animation-delay: 0.65s; }
        .link-card:nth-child(7) { animation-delay: 0.75s; }
        .link-card:nth-child(8) { animation-delay: 0.85s; }

        .link-card:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: var(--shadow-lg);
            background-color: #ffffff;
        }

        /* Gold Standout/Featured Card */
        .link-card.standout-item {
            border: 2px solid var(--gold-accent);
            background: linear-gradient(135deg, #ffffff 0%, #fffbf0 100%);
        }

        .link-card.standout-item .icon-wrapper {
            color: var(--gold-accent);
        }

        /* Email Card Styling */
        .link-card.email-item {
            background: rgba(15, 76, 92, 0.85);
            border: 1px solid var(--teal-bright);
            color: #ffffff;
            margin-top: 6px;
        }

        .link-card.email-item .icon-wrapper {
            color: var(--teal-bright);
        }

        .link-card.email-item .link-title {
            color: #ffffff;
        }

        .link-card.email-item:hover {
            background: var(--teal-deep);
        }

        .icon-wrapper {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--teal-bright);
            margin-right: 14px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .link-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            flex-grow: 1;
            text-align: left;
        }

        .video-thumbnail {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid rgba(0, 0, 0, 0.15);
            margin-left: 8px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Headshot Image -->
        <img src="headshot.jpg" alt="Isaac Gould" class="headshot">
         
        <h1>Isaac Gould</h1>
        <div class="affil">NRC Postdoc, Naval Research Lab<br>Washington DC</div>

        <!-- Links Grid -->
        <div class="link-grid">
            <!-- 1. LinkedIn -->
            <a href="https://www.linkedin.com/in/isaac-gould/" target="_blank" rel="noopener noreferrer" class="link-card">
                <div class="icon-wrapper"><i class="fab fa-linkedin-in"></i></div>
                <span class="link-title">LinkedIn</span>
            </a>

            <!-- 2. Instagram -->
            <a href="https://www.instagram.com/gouldilocks24/" target="_blank" rel="noopener noreferrer" class="link-card">
                <div class="icon-wrapper"><i class="fab fa-instagram"></i></div>
                <span class="link-title">Instagram</span>
            </a>

            <!-- 3. Google Scholar -->
            <a href="https://scholar.google.com/citations?hl=en&user=2F5hY3IAAAAJ&view_op=list_works&sortby=pubdate" target="_blank" rel="noopener noreferrer" class="link-card">
                <div class="icon-wrapper"><i class="ai ai-google-scholar"></i></div>
                <span class="link-title">Google Scholar</span>
            </a>

            <!-- 4. Streamlit App (Gold Highlight) -->
            <a href="https://vibronic-franck-condon.streamlit.app/" target="_blank" rel="noopener noreferrer" class="link-card standout-item">
                <div class="icon-wrapper"><i class="fas fa-chart-line"></i></div>
                <span class="link-title">Streamlit App</span>
            </a>

            <!-- 5. Crystal Cooling Video with Thumbnail (Gold Highlight) -->
            
            <a href="https://drive.google.com/file/d/1KJqM5iqSpdeSrL3dwpeKHajFVSDUnCkc/view?usp=drive_link" target="_blank" rel="noopener noreferrer" class="link-card standout-item">
                <div class="icon-wrapper"><i class="fab fa-google-drive"></i></div>
                <span class="link-title">Crystal Cooling Video</span>
                <img src="Crystal_cooling.png" alt="Preview" class="video-thumbnail">
            </a>

            <!-- 6. Conference Poster (Gold Highlight) -->
            <a href="https://drive.google.com/file/d/1niAHUsUFIKdaziQsJJgGgF_uCjqPjtkC/view?usp=sharing" target="_blank" rel="noopener noreferrer" class="link-card standout-item">
                <div class="icon-wrapper"><i class="fas fa-file-powerpoint"></i></div>
                <span class="link-title">Conference Poster</span>
            </a>

            <!-- 7. CV
            <a href="https://qr.link/pUctgq" target="_blank" rel="noopener noreferrer" class="link-card">
                <div class="icon-wrapper"><i class="fas fa-file-pdf"></i></div>
                <span class="link-title">CV</span>
            </a> -->

            <!-- 8. Direct Email Contact Action -->
            <a href="mailto:isaacgould94@gmail.com" class="link-card email-item">
                <div class="icon-wrapper"><i class="far fa-envelope"></i></div>
                <span class="link-title">isaacgould94@gmail.com</span>
            </a>
        </div>
    </div>
</body>
</html>
